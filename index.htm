<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>لعبة قلب زينب | مسابقة الشخصية 💖</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ff9a9e 0%, #fad0c4 50%, #fad0c4 100%);
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', 'Tajawal', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        .game-card {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 248, 245, 0.95);
            border-radius: 68px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.2), 0 0 0 10px rgba(255, 215, 215, 0.5);
            padding: 30px 25px 45px;
            text-align: center;
            backdrop-filter: blur(2px);
            transition: 0.3s;
            border: 1px solid #ffb7b2;
        }

        h1 {
            font-size: 2.6rem;
            background: linear-gradient(135deg, #e43b6e, #ff8c9e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .admire-text {
            background: #fff0f3;
            padding: 20px 18px;
            border-radius: 60px;
            margin: 15px 0 20px;
            font-size: 1.3rem;
            line-height: 1.6;
            color: #a13e4f;
            font-weight: bold;
            box-shadow: inset 0 1px 4px #ffcdd4, 0 6px 12px rgba(0,0,0,0.05);
            border: 1px solid #ffbfc9;
        }

        .heart-icon {
            display: inline-block;
            animation: heartbeat 1.2s infinite;
            font-size: 1.5rem;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .question {
            font-size: 2rem;
            font-weight: 800;
            color: #c43b5e;
            margin: 20px 0 15px;
            background: #ffe2e7;
            display: inline-block;
            padding: 8px 24px;
            border-radius: 50px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .buttons-battlefield {
            position: relative;
            min-height: 170px;
            margin: 25px 0 20px;
            background: #ffefef4d;
            border-radius: 50px;
            padding: 20px 10px;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .yes-btn {
            background: linear-gradient(120deg, #43e97b, #38f9a0);
            border: none;
            padding: 16px 42px;
            font-size: 2rem;
            font-weight: bold;
            font-family: inherit;
            color: white;
            border-radius: 70px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 12px 20px rgba(56, 249, 160, 0.3);
            border: 1px solid #ffffffaa;
            display: inline-block;
            letter-spacing: 1px;
            width: auto;
            min-width: 160px;
            position: relative;
            z-index: 30;
            touch-action: manipulation;
        }

        .no-btn {
            background: #d15a6e;
            border: none;
            padding: 16px 38px;
            font-size: 2rem;
            font-weight: bold;
            font-family: inherit;
            color: #fff0f0;
            border-radius: 70px;
            cursor: pointer;
            transition: all 0.15s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            box-shadow: 0 8px 14px rgba(0, 0, 0, 0.2);
            border: 1px solid #ffc0cb;
            white-space: nowrap;
            position: absolute;
            z-index: 20;
            backdrop-filter: blur(2px);
            width: auto;
            min-width: 140px;
            touch-action: manipulation;
        }

        .counter-box {
            background: #ffd9df;
            border-radius: 40px;
            padding: 8px 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #b13b55;
            box-shadow: inset 0 0 0 2px white, 0 4px 8px rgba(0,0,0,0.05);
        }

        .counter-box span:first-child {
            background: #b13b55;
            color: white;
            padding: 4px 14px;
            border-radius: 50px;
        }

        #attemptCount {
            font-size: 1.7rem;
            font-weight: 800;
            min-width: 50px;
            display: inline-block;
            color: #a12242;
        }

        footer {
            font-size: 0.8rem;
            margin-top: 25px;
            opacity: 0.7;
            color: #ac7080;
        }

        button {
            font-weight: bold;
            touch-action: manipulation;
        }

        /* مساحة الأسئلة */
        .quiz-container {
            margin-top: 20px;
            background: #fff5f0;
            border-radius: 40px;
            padding: 20px;
            text-align: right;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease;
        }

        .quiz-question {
            font-size: 1.4rem;
            font-weight: bold;
            color: #a13e4f;
            margin-bottom: 20px;
        }

        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .quiz-option {
            background: #ffefef;
            border: 2px solid #ffbfc9;
            border-radius: 50px;
            padding: 12px 18px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: right;
            color: #5a2e3a;
            font-weight: 500;
        }

        .quiz-option:hover {
            background: #ffe0e5;
            transform: scale(1.01);
        }

        .quiz-progress {
            font-size: 0.9rem;
            color: #b13b55;
            margin-top: 10px;
        }

        .result-box {
            background: linear-gradient(135deg, #ffe6f0, #ffd9e2);
            border-radius: 40px;
            padding: 25px;
            margin-top: 20px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #a13e4f;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 550px) {
            .game-card {
                padding: 20px 18px 30px;
            }
            .yes-btn, .no-btn {
                font-size: 1.5rem;
                padding: 12px 26px;
                min-width: 120px;
            }
            .quiz-question {
                font-size: 1.2rem;
            }
            .quiz-option {
                font-size: 1rem;
                padding: 10px 14px;
            }
        }
    </style>
</head>
<body>

<div class="game-card" id="gameContainer">
    <h1>
        🎀 إلى  زينب 🎀
        <i>💗</i>
    </h1>

    <div class="admire-text">
        <p>✨ <span class="heart-icon">💖</span> زينب الجميلة ✨</p>
        <p>أردت أن أهديكِ هذه اللعبة البسيطة..<br>
        لأن ابتسامتكِ تشبه القمر ، وضحكتكِ تملأ قلبي فرحاً.<br>
        <p>🌷 أعجابي بكِ لا يوصف 🌷</p>
    </div>

    <div class="question">
        ❓ هل تُعجبي بي؟ ❓
    </div>

    <div class="buttons-battlefield" id="battlefield">
        <button class="yes-btn" id="yesButton">نعم 💘</button>
        <button class="no-btn" id="noButton">لا 😅</button>
    </div>

    <div class="counter-box">
        <span>🏃‍♀️ محاولات الإمساك بـ "لا" 🏃‍♂️</span>
        <span id="attemptCount">0</span>
        <span>💢 (مستحيل!)</span>
    </div>

    <footer>
        💌 لعبة المراوغة: مهما حاولتِ، زر "لا" يهرب! اضغطي "نعم" بكل حب 💌
    </footer>
</div>

<script>
    (function() {
        // -------------------- عناصر اللعبة --------------------
        const noBtn = document.getElementById('noButton');
        const yesBtn = document.getElementById('yesButton');
        const battlefield = document.getElementById('battlefield');
        const attemptSpan = document.getElementById('attemptCount');
        
        let attempts = 0;
        let gameFinished = false;

        // -------------------- وظائف هروب "لا" --------------------
        function isOverlappingWithYes() {
            const noRect = noBtn.getBoundingClientRect();
            const yesRect = yesBtn.getBoundingClientRect();
            return !(noRect.right < yesRect.left || 
                     noRect.left > yesRect.right || 
                     noRect.bottom < yesRect.top || 
                     noRect.top > yesRect.bottom);
        }

        function moveNoButtonRandomly() {
            if (gameFinished) return;
            const containerRect = battlefield.getBoundingClientRect();
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;
            const maxLeft = Math.max(0, containerRect.width - btnWidth - 10);
            const maxTop = Math.max(0, containerRect.height - btnHeight - 10);
            
            let newLeft, newTop;
            let found = false;
            for (let i = 0; i < 30; i++) {
                newLeft = Math.random() * maxLeft;
                newTop = Math.random() * maxTop;
                newLeft = Math.min(Math.max(newLeft, 5), maxLeft);
                newTop = Math.min(Math.max(newTop, 5), maxTop);
                noBtn.style.left = newLeft + 'px';
                noBtn.style.top = newTop + 'px';
                if (!isOverlappingWithYes()) {
                    found = true;
                    break;
                }
            }
            if (!found) {
                const yesRect = yesBtn.getBoundingClientRect();
                const containerCenterX = containerRect.left + containerRect.width / 2;
                const containerCenterY = containerRect.top + containerRect.height / 2;
                const yesCenterX = (yesRect.left + yesRect.right) / 2;
                const yesCenterY = (yesRect.top + yesRect.bottom) / 2;
                let dirX = yesCenterX < containerCenterX ? 1 : -1;
                let dirY = yesCenterY < containerCenterY ? 1 : -1;
                newLeft = dirX === 1 ? maxLeft - btnWidth : 5;
                newTop = dirY === 1 ? maxTop - btnHeight : 5;
                newLeft = Math.min(Math.max(newLeft, 5), maxLeft);
                newTop = Math.min(Math.max(newTop, 5), maxTop);
                noBtn.style.left = newLeft + 'px';
                noBtn.style.top = newTop + 'px';
            }
        }

        function setInitialNoPosition() {
            if (gameFinished) return;
            noBtn.style.position = 'absolute';
            const yesRect = yesBtn.getBoundingClientRect();
            const containerRect = battlefield.getBoundingClientRect();
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;
            let left = yesRect.right - containerRect.left + 20;
            let top = yesRect.top - containerRect.top;
            const maxLeft = Math.max(0, containerRect.width - btnWidth - 10);
            const maxTop = Math.max(0, containerRect.height - btnHeight - 10);
            left = Math.min(Math.max(left, 10), maxLeft);
            top = Math.min(Math.max(top, 10), maxTop);
            noBtn.style.left = left + 'px';
            noBtn.style.top = top + 'px';
        }

        function handleResize() {
            if (!gameFinished && noBtn) moveNoButtonRandomly();
        }

        function incrementAttempt() {
            if (gameFinished) return;
            attempts++;
            attemptSpan.innerText = attempts;
            const counterDiv = document.querySelector('.counter-box');
            if (counterDiv) {
                counterDiv.style.transform = 'scale(1.05)';
                setTimeout(() => { if(counterDiv) counterDiv.style.transform = 'scale(1)'; }, 150);
            }
        }

        function showFloatingMessage(msg, element) {
            let floatMsg = document.createElement('div');
            floatMsg.innerText = msg;
            floatMsg.style.position = 'fixed';
            floatMsg.style.backgroundColor = '#ff80a5';
            floatMsg.style.color = 'white';
            floatMsg.style.padding = '5px 12px';
            floatMsg.style.borderRadius = '40px';
            floatMsg.style.fontSize = '0.8rem';
            floatMsg.style.fontWeight = 'bold';
            floatMsg.style.zIndex = '999';
            floatMsg.style.pointerEvents = 'none';
            floatMsg.style.whiteSpace = 'nowrap';
            floatMsg.style.boxShadow = '0 4px 12px black';
            const rect = element.getBoundingClientRect();
            floatMsg.style.left = rect.left + 'px';
            floatMsg.style.top = (rect.top - 30) + 'px';
            document.body.appendChild(floatMsg);
            setTimeout(() => { floatMsg.remove(); }, 700);
        }

        let escapeCooldown = false;
        function escapeNo() {
            if (gameFinished) return;
            if (escapeCooldown) return;
            escapeCooldown = true;
            moveNoButtonRandomly();
            setTimeout(() => { escapeCooldown = false; }, 100);
        }

        function onNoClick(e) {
            e.preventDefault();
            e.stopPropagation();
            if (gameFinished) return;
            incrementAttempt();
            escapeNo();
            noBtn.style.transform = 'scale(0.95)';
            setTimeout(() => { if(noBtn) noBtn.style.transform = ''; }, 120);
            showFloatingMessage("🚫 ما راح تقدري تضغطيها! 😜", noBtn);
            return false;
        }

        function onNoMouseEnter(e) {
            if (gameFinished) return;
            escapeNo();
        }

        function onNoTouchStart(e) {
            e.preventDefault();
            if (gameFinished) return;
            incrementAttempt();
            escapeNo();
            showFloatingMessage("🏃‍♂️ هههه زر لا هارب!", noBtn);
            return false;
        }

        // -------------------- الأسئلة والمسابقة --------------------
        const questions = [
            { text: "ما هو الشيء الذي يجعلكِ سعيدة جداً؟", options: ["قضاء الوقت مع الأصدقاء والعائلة", "تحقيق هدف كنتِ تسعين له", "السفر واكتشاف أماكن جديدة", "الاسترخاء مع كتاب أو فيلم مفضل"] },
            { text: "كيف تقضين وقت فراغكِ عادة؟", options: ["أمارس هواية أحبها (رسم، موسيقى، رياضة...)", "أتحدث مع أصدقائي أو أتواصل معهم", "أتعلم شيئاً جديداً (لغة، مهارة...)", "أنام أو أتابع المسلسلات"] },
            { text: "أي نوع من الأفلام أو المسلسلات تفضلين؟", options: ["رومانسي / دراما", "كوميدي / خفيف", "أكشن / مغامرات", "وثائقي / علمي"] },
            { text: "لو كان بإمكانك السفر إلى أي مكان في العالم الآن، أين ستذهبين؟", options: ["مدينة أوروبية هادئة (مثل باريس أو سويسرا)", "جزيرة استوائية مع شاطئ", "مكان مليء بالتاريخ والثقافة", "مغامرة في الطبيعة (جبال، غابات)"] },
            { text: "ما هي الصفة التي تحبينها أكثر في نفسك؟", options: ["التفاؤل والإيجابية", "الصدق والصراحة", "الإبداع والابتكار", "الهدوء والاستماع للآخرين"] },
            { text: "كيف تتصرفين عندما تواجهين مشكلة صعبة؟", options: ["أفكر بها وحدي وأحاول إيجاد حل", "أطلب المساعدة من شخص أثق به", "أتجنب التفكير فيها لفترة ثم أواجهها", "أبحث عن معلومات أكثر قبل اتخاذ قرار"] },
            { text: "ما هو اللون المفضل لديكِ؟", options: ["الأزرق / الأخضر", "الوردي / الأحمر", "الأسود / الرمادي", "الأصفر / البرتقالي"] },
            { text: "أي من هذه العبارات تصفكِ أكثر؟", options: ["أحب التخطيط والتنظيم", "أحب العفوية والمفاجآت", "أجمع بين التخطيط والمرونة", "لا أحب الالتزامات كثيراً"] },
            { text: "ما هو نوع الطعام الذي تفضلينه؟", options: ["حلويات وحلويات 😊", "أطباق رئيسية شهية", "خفيف وصحي", "مغامرات في أكلات جديدة"] },
            { text: "بأي شيء تحبين أن يُذكر اسمكِ؟", options: ["بسمعة طيبة وأخلاق", "بإنجازاتي ونجاحاتي", "بكوني شخصاً محبوباً من حولي", "بضحكتي وروحي المرحة"] }
        ];

        let currentQuestionIndex = 0;
        let answers = [];

        // تحليل الإجابات وتوليد ملخص
        function generateSummary() {
            let summary = "";
            // بناء بسيط: نعطي تحليل بناءً على أول إجابة أو أكثر
            const firstAnswer = answers[0];
            const secondAnswer = answers[1];
            const thirdAnswer = answers[2];
            const fourthAnswer = answers[3];
            const fifthAnswer = answers[4];
            
            if (answers[0] === 0 || answers[0] === 1) summary += "💖 تحبين العلاقات الإنسانية والاهتمام بالآخرين. ";
            if (answers[1] === 0 || answers[1] === 2) summary += "🎨 لديكِ روح الإبداع وحب التعلم. ";
            if (answers[2] === 1) summary += "😄 روح الدعابة والضحك تملأ حياتك. ";
            if (answers[3] === 1 || answers[3] === 3) summary += "🌊 شغوفة بالمغامرة واستكشاف الجديد. ";
            if (answers[4] === 0) summary += "✨ التفاؤل والإيجابية هما عنوانك. ";
            if (answers[4] === 2) summary += "🎭 مبدعة ومبتكرة بطبعك. ";
            if (answers[5] === 1) summary += "🤝 تعتمدين على من حولك وتثقين بهم. ";
            if (answers[6] === 1) summary += "💗 أنثوية وودودة، الألوان الزاهية تعبر عنك. ";
            if (answers[7] === 0) summary += "📋 منظمة وتحبين التخطيط. ";
            if (answers[7] === 1) summary += "🎉 عفوية ومليئة بالمفاجآت السارة. ";
            if (answers[8] === 0) summary += "🍰 للحلويات مكانة خاصة في قلبك! ";
            if (answers[9] === 0) summary += "🌟 السمعة الطيبة والأخلاق هي قيمتك الكبرى. ";
            if (answers[9] === 3) summary += "😁 ضحكتك وروحك المرحة تجذب الجميع إليك. ";
            
            if (summary === "") summary = "أنتِ شخصية متعددة المواهب والاهتمامات، مزيج رائع من الجد والمرح! 💫";
            
            return summary + "\n\n✨ أنتِ رائعة كما أنتِ، وأنا معجب بهذه الشخصية الجميلة ✨";
        }

        function displayQuestion() {
            const q = questions[currentQuestionIndex];
            let html = `
                <div class="quiz-container" id="quizContainer">
                    <div class="quiz-question">${currentQuestionIndex+1}. ${q.text}</div>
                    <div class="quiz-options">
            `;
            q.options.forEach((opt, idx) => {
                html += `<div class="quiz-option" data-opt-index="${idx}">${String.fromCharCode(65+idx)} - ${opt}</div>`;
            });
            html += `</div><div class="quiz-progress">السؤال ${currentQuestionIndex+1} من ${questions.length}</div></div>`;
            
            const battlefieldDiv = document.querySelector('.buttons-battlefield');
            // إزالة أي حاوية أسئلة سابقة
            const oldQuiz = document.getElementById('quizContainer');
            if (oldQuiz) oldQuiz.remove();
            battlefieldDiv.insertAdjacentHTML('afterend', html);
            
            // إضافة مستمعات للخيارات
            document.querySelectorAll('.quiz-option').forEach(opt => {
                opt.addEventListener('click', (e) => {
                    const selectedIdx = parseInt(opt.dataset.optIndex);
                    answers.push(selectedIdx);
                    currentQuestionIndex++;
                    if (currentQuestionIndex < questions.length) {
                        displayQuestion();
                    } else {
                        showResult();
                    }
                });
                // تحسين اللمس
                opt.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const selectedIdx = parseInt(opt.dataset.optIndex);
                    answers.push(selectedIdx);
                    currentQuestionIndex++;
                    if (currentQuestionIndex < questions.length) {
                        displayQuestion();
                    } else {
                        showResult();
                    }
                }, { passive: false });
            });
        }

        function showResult() {
            const summary = generateSummary();
            const battlefieldDiv = document.querySelector('.buttons-battlefield');
            const oldQuiz = document.getElementById('quizContainer');
            if (oldQuiz) oldQuiz.remove();
            
            const resultHtml = `
                <div class="result-box" id="resultBox">
                    🌸🌸🌸 ملخص شخصيتك الرائعة 🌸🌸🌸<br><br>
                    ${summary}<br><br>
                    💖 شكراً لمشاركتك في المسابقة 💖<br>
                    <div style="font-size: 2rem; margin-top: 15px;">💘😍💘</div>
                </div>
            `;
            battlefieldDiv.insertAdjacentHTML('afterend', resultHtml);
            
            // إطلاق كونفيتي إضافي
            canvasConfetti({
                particleCount: 300,
                spread: 120,
                origin: { y: 0.5 },
                colors: ['#ff99cc', '#ff6f91', '#ffb347', '#ffd966'],
                shapes: ['heart', 'circle']
            });
        }

        // -------------------- الضغط على "نعم" --------------------
        function onYesClick(e) {
            if (gameFinished) return;
            gameFinished = true;
            
            // إزالة مستمعات لا
            noBtn.removeEventListener('click', onNoClick);
            noBtn.removeEventListener('mouseenter', onNoMouseEnter);
            noBtn.removeEventListener('touchstart', onNoTouchStart);
            noBtn.style.pointerEvents = 'none';
            noBtn.style.opacity = '0.5';
            noBtn.style.filter = 'grayscale(0.2)';
            
            yesBtn.style.display = 'none';
            noBtn.style.display = 'none';
            
            // إطلاق كونفيتي أولي
            canvasConfetti({
                particleCount: 200,
                spread: 100,
                origin: { y: 0.6 },
                startVelocity: 20,
                colors: ['#ff6f91', '#ffb6c1', '#ff4d6d', '#ff99cc', '#ffd966'],
                shapes: ['heart', 'circle']
            });
            
            // عرض أول سؤال
            currentQuestionIndex = 0;
            answers = [];
            displayQuestion();
            
            // تحديث عداد المحاولات
            attemptSpan.innerText = attempts + " 💞 فشلتي في الهروب 😂";
            const lastSpan = document.querySelector('.counter-box span:last-child');
            if (lastSpan) lastSpan.innerHTML = "🥰 الآن تعالي نتعرف عليكِ 🥰";
            
            // تأثير قلوب متساقطة لفترة
            const heartsRain = setInterval(() => {
                if (gameFinished) {
                    let heartSpan = document.createElement('div');
                    heartSpan.innerHTML = '💖';
                    heartSpan.style.position = 'fixed';
                    heartSpan.style.left = Math.random() * window.innerWidth + 'px';
                    heartSpan.style.top = '-20px';
                    heartSpan.style.fontSize = (20 + Math.random() * 30) + 'px';
                    heartSpan.style.opacity = '0.8';
                    heartSpan.style.transition = 'all 3s linear';
                    heartSpan.style.zIndex = '9999';
                    heartSpan.style.pointerEvents = 'none';
                    document.body.appendChild(heartSpan);
                    setTimeout(() => {
                        heartSpan.style.top = window.innerHeight + 20 + 'px';
                        heartSpan.style.opacity = '0';
                        setTimeout(() => heartSpan.remove(), 3000);
                    }, 50);
                }
            }, 400);
            setTimeout(() => clearInterval(heartsRain), 5000);
        }

        // -------------------- تهيئة اللعبة --------------------
        function initGame() {
            noBtn.style.position = 'absolute';
            noBtn.style.display = 'inline-block';
            battlefield.style.position = 'relative';
            setInitialNoPosition();
            
            noBtn.addEventListener('click', onNoClick);
            noBtn.addEventListener('mouseenter', onNoMouseEnter);
            noBtn.addEventListener('touchstart', onNoTouchStart, { passive: false });
            
            yesBtn.addEventListener('click', onYesClick);
            yesBtn.addEventListener('touchstart', function(e) {
                if (!gameFinished) {
                    e.preventDefault();
                    onYesClick(e);
                }
            }, { passive: false });
            
            noBtn.addEventListener('touchcancel', (e) => { e.preventDefault(); });
            noBtn.addEventListener('contextmenu', (e) => { e.preventDefault(); });
        }
        
        initGame();
        window.addEventListener('resize', handleResize);
        const resizeObserver = new ResizeObserver(() => { if (!gameFinished && noBtn) handleResize(); });
        if (battlefield) resizeObserver.observe(battlefield);
    })();
</script>
</body>
</html>
